<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WorkHours Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WorkHours">
    
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-border: rgba(255, 255, 255, 0.4);
            --text-color: #1d1d1f;
            --text-secondary: #86868b;
            --primary: #0071e3;
            --primary-light: rgba(0, 113, 227, 0.1);
            --success: #34c759;
            --success-light: rgba(52, 199, 89, 0.1);
            --danger: #ff3b30;
            --danger-light: rgba(255, 59, 48, 0.1);
            --warning: #ff9500;
            --blur: blur(20px);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --card-bg: rgba(28, 28, 30, 0.7);
                --card-border: rgba(255, 255, 255, 0.05);
                --text-color: #f5f5f7;
                --text-secondary: #86868b;
                --primary: #2997ff;
                --primary-light: rgba(41, 151, 255, 0.15);
                --success: #30d158;
                --success-light: rgba(48, 209, 88, 0.15);
                --danger: #ff453a;
                --danger-light: rgba(255, 69, 58, 0.15);
                --warning: #ff9f0a;
            }
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: calc(40px + env(safe-area-inset-top)) 20px calc(200px + env(safe-area-inset-bottom)) 20px;
            letter-spacing: -0.015em;
        }

        h2, h3 { 
            margin-top: 0; 
            font-weight: 700; 
            letter-spacing: -0.02em;
        }
        h2 { font-size: 26px; margin-bottom: 20px; }
        h3 { font-size: 18px; margin-bottom: 16px; color: var(--text-color); }
        
        .card {
            background: var(--card-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:active { 
            transform: scale(0.97);
            opacity: 0.9;
        }
        .btn-success { background-color: var(--success); }
        .btn-danger { background-color: var(--danger); }
        .btn-secondary { 
            background-color: var(--primary-light); 
            color: var(--primary); 
        }

        .grid-2 { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-bottom: 12px; 
        }

        /* שיפור הרספונסיביות של תיבות הקלט הידניות כדי שלא יתנגשו */
        .time-inputs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        @media (max-width: 380px) {
            .time-inputs-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
        }

        .input-group { 
            margin-bottom: 16px; 
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* מיישר את תיבות הקלט לתחתית */
        }
        .input-group label { 
            display: block; 
            font-size: 13px; 
            font-weight: 500;
            color: var(--text-secondary); 
            margin-bottom: 6px; 
            text-transform: uppercase;
            letter-spacing: 0.05em;
            min-height: 32px; /* נותן גובה מינימלי לכותרת כדי ליישר את השורות */
            display: flex;
            align-items: flex-end;
        }
        .input-group input {
            width: 100%; 
            padding: 14px; 
            border: 1px solid var(--card-border);
            border-radius: 12px; 
            background: rgba(0, 0, 0, 0.03); 
            color: var(--text-color); 
            font-size: 16px;
            font-weight: 500;
            outline: none;
            transition: border-color 0.2s;
            height: 48px; /* גובה אחיד לכל התיבות */
        }
        @media (prefers-color-scheme: dark) {
            .input-group input { background: rgba(255, 255, 255, 0.05); }
        }
        .input-group input:focus { border-color: var(--primary); }

        /* Floating Dashboard - Fixed & Stable */
        .footer-dashboard {
            position: fixed; 
            bottom: calc(16px + env(safe-area-inset-bottom)); 
            left: 16px; 
            right: 16px;
            background: var(--card-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 14px 8px; 
            display: grid; 
            grid-template-columns: repeat(4, 1fr);
            gap: 4px; 
            text-align: center; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
            z-index: 9999;
        }
        .dash-item {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-width: 0;
        }
        .dash-item .val { 
            font-size: 15px; 
            font-weight: 700; 
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }
        .dash-item .lbl { 
            font-size: 10px; 
            font-weight: 600; 
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }
        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }

        @media (max-width: 380px) {
            .dash-item .val { font-size: 13px; }
            .dash-item .lbl { font-size: 9px; }
            .footer-dashboard { padding: 12px 4px; }
        }

        /* History list */
        .history-item {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 14px 0; 
            border-bottom: 1px solid var(--card-border);
            font-size: 15px;
        }
        .history-item:last-child { border-bottom: none; }
        .history-date { font-weight: 600; }
        .history-time { color: var(--text-secondary); font-size: 13px; margin-top: 2px; }
        
        .badge {
            font-size: 12px; 
            font-weight: 600;
            padding: 4px 10px; 
            border-radius: 8px; 
            display: inline-block;
        }
        .badge-extra { background-color: var(--success-light); color: var(--success); }
        .badge-deficit { background-color: var(--danger-light); color: var(--danger); }
        .badge-special { background-color: var(--primary-light); color: var(--primary); }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="current-date">Today</h2>
        <div class="grid-2">
            <button class="btn btn-success" onclick="logAction('in')">☀️ Check In</button>
            <button class="btn btn-danger" onclick="logAction('out')">🌙 Check Out</button>
        </div>
        <div class="grid-2">
            <button class="btn btn-secondary" onclick="logSpecial('Vacation')">🌴 Vacation</button>
            <button class="btn btn-secondary" onclick="logSpecial('Sick Leave')">🤒 Sick Leave</button>
        </div>
        <div id="today-status" style="text-align: center; margin-top: 14px; font-weight: 600; font-size: 15px; color: var(--primary);"></div>
    </div>

    <div class="card">
        <h3>Manual Adjustment</h3>
        <div class="input-group" style="margin-bottom: 12px;">
            <label style="min-height: auto;">Select Date</label>
            <input type="date" id="edit-date">
        </div>
        <div class="time-inputs-grid">
            <div class="input-group" style="margin-bottom: 0;">
                <label style="min-height: auto;">Check In</label>
                <input type="time" id="edit-in">
            </div>
            <div class="input-group" style="margin-bottom: 0;">
                <label style="min-height: auto;">Check Out</label>
                <input type="time" id="edit-out">
            </div>
        </div>
        <button class="btn" onclick="saveManual()">Save Entry</button>
    </div>

    <div class="card">
        <h3>Base Configuration</h3>
        <div class="grid-2" style="margin-bottom: 0;">
            <div class="input-group" style="margin-bottom: 0;">
                <label>Base Salary (₪)</label>
                <input type="number" id="cfg-base-salary" value="15000" onchange="saveConfig()">
            </div>
            <div class="input-group" style="margin-bottom: 0;">
                <label>Daily Travel (₪)</label>
                <input type="number" id="cfg-travel" value="25" onchange="saveConfig()">
            </div>
        </div>
    </div>

    <div class="card">
        <h3>Log Overview</h3>
        <div id="history-list"></div>
    </div>

    <div class="footer-dashboard">
        <div class="dash-item">
            <div class="val" id="dash-normal">0</div>
            <div class="lbl">Regular</div>
        </div>
        <div class="dash-item text-success">
            <div class="val" id="dash-extra">0</div>
            <div class="lbl">Overtime</div>
        </div>
        <div class="dash-item text-danger">
            <div class="val" id="dash-deficit">0</div>
            <div class="lbl">Deficit</div>
        </div>
        <div class="dash-item" style="border-left: 1px solid var(--card-border); padding-left: 4px;">
            <div class="val" id="dash-gross" style="color: var(--primary);">₪0</div>
            <div class="lbl">Est. Gross</div>
        </div>
    </div>

    <script>
        const STANDARD_HOURS = 8.5;
        let db = JSON.parse(localStorage.getItem('work_hours_db')) || {};
        let config = JSON.parse(localStorage.getItem('work_hours_cfg')) || { baseSalary: 15000, travel: 25 };

        // UI Initialization
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', day: 'numeric', month: 'short' });
        document.getElementById('edit-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('cfg-base-salary').value = config.baseSalary;
        document.getElementById('cfg-travel').value = config.travel;

        function saveConfig() {
            config.baseSalary = parseFloat(document.getElementById('cfg-base-salary').value) || 0;
            config.travel = parseFloat(document.getElementById('cfg-travel').value) || 0;
            localStorage.setItem('work_hours_cfg', JSON.stringify(config));
            calculateMonth();
        }

        function getTodayKey() {
            return new Date().toISOString().split('T')[0];
        }

        function logAction(type) {
            const today = getTodayKey();
            const now = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
            
            if (!db[today]) db[today] = { in: '', out: '', type: 'Work' };
            
            db[today][type] = now;
            db[today].type = 'Work';
            
            localStorage.setItem('work_hours_db', JSON.stringify(db));
            updateTodayStatus();
            calculateMonth();
        }

        function logSpecial(statusType) {
            const today = getTodayKey();
            db[today] = { in: '00:00', out: '00:00', type: statusType };
            localStorage.setItem('work_hours_db', JSON.stringify(db));
            updateTodayStatus();
            calculateMonth();
        }

        function saveManual() {
            const date = document.getElementById('edit-date').value;
            const timeIn = document.getElementById('edit-in').value;
            const timeOut = document.getElementById('edit-out').value;
            
            if(!date) return;
            
            db[date] = { in: timeIn, out: timeOut, type: 'Work' };
            localStorage.setItem('work_hours_db', JSON.stringify(db));
            calculateMonth();
            alert('Saved successfully!');
        }

        function updateTodayStatus() {
            const today = db[getTodayKey()];
            const statusDiv = document.getElementById('today-status');
            if (today && statusDiv) {
                if (today.type !== 'Work') {
                    statusDiv.innerHTML = `Status: <span style="color:var(--primary)">${today.type}</span>`;
                } else {
                    statusDiv.innerHTML = `In: ${today.in || '--:--'}  |  Out: ${today.out || '--:--'}`;
                }
            }
        }

        function timeToHours(timeStr) {
            if (!timeStr) return 0;
            const [hrs, mins] = timeStr.split(':').map(Number);
            return hrs + (mins / 60);
        }

        function calculateMonth() {
            let totalNormal = 0;
            let totalExtra125 = 0;
            let totalExtra150 = 0;
            let totalDeficit = 0;
            let workingDaysCount = 0;

            const historyList = document.getElementById('history-list');
            if (!historyList) return;
            historyList.innerHTML = '';

            const sortedDates = Object.keys(db).sort((a,b) => new Date(b) - new Date(a));

            sortedDates.forEach(date => {
                const dayData = db[date];
                let dayNormal = 0, dayExtra125 = 0, dayExtra150 = 0, dayDeficit = 0;
                let displayTime = '';
                let badgeHTML = '';

                if (dayData.type === 'Vacation' || dayData.type === 'Sick Leave') {
                    dayNormal = STANDARD_HOURS;
                    displayTime = dayData.type;
                    badgeHTML = `<span class="badge badge-special">${dayData.type}</span>`;
                } else if (dayData.in && dayData.out) {
                    workingDaysCount++;
                    const hoursWorked = timeToHours(dayData.out) - timeToHours(dayData.in);
                    displayTime = `${dayData.in} — ${dayData.out}`;

                    if (hoursWorked >= STANDARD_HOURS) {
                        dayNormal = STANDARD_HOURS;
                        let extra = hoursWorked - STANDARD_HOURS;
                        if (extra > 0) {
                            dayExtra125 = Math.min(extra, 2);
                            dayExtra150 = Math.max(0, extra - 2);
                            badgeHTML = `<span class="badge badge-extra">+${(dayExtra125 + dayExtra150).toFixed(1)}h</span>`;
                        }
                    } else {
                        dayNormal = hoursWorked;
                        dayDeficit = STANDARD_HOURS - hoursWorked;
                        badgeHTML = `<span class="badge badge-deficit">-${dayDeficit.toFixed(1)}h</span>`;
                    }
                }

                totalNormal += dayNormal;
                totalExtra125 += dayExtra125;
                totalExtra150 += dayExtra150;
                totalDeficit += dayDeficit;

                const formattedDate = new Date(date).toLocaleDateString('en-US', {day: 'numeric', month: 'short'});
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <div>
                        <div class="history-date">${formattedDate}</div>
                        <div class="history-time">${displayTime}</div>
                    </div>
                    <div>${badgeHTML}</div>
                `;
                historyList.appendChild(item);
            });

            const hourlyRate = config.baseSalary / 182;
            const extraPay = (totalExtra125 * hourlyRate * 1.25) + (totalExtra150 * hourlyRate * 1.5);
            const deficitDeduction = totalDeficit * hourlyRate;
            const travelPay = workingDaysCount * config.travel;
            
            const estimatedGross = config.baseSalary + extraPay - deficitDeduction + travelPay;

            document.getElementById('dash-normal').innerText = totalNormal.toFixed(1);
            document.getElementById('dash-extra').innerText = (totalExtra125 + totalExtra150).toFixed(1);
            document.getElementById('dash-deficit').innerText = totalDeficit.toFixed(1);
            document.getElementById('dash-gross').innerText = `₪${Math.round(estimatedGross).toLocaleString()}`;
        }

        updateTodayStatus();
        calculateMonth();
    </script>
</body>
</html>
