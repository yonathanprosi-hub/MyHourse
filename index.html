<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hours.IO</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hours">
    
    <style>
        :root {
            --bg: #050505;
            --surface: #121214;
            --surface-secondary: #1a1a1e;
            --border: rgba(255, 255, 255, 0.04);
            --text: #ffffff;
            --text-muted: #6e6e73;
            
            --neon-blue: #007aff;
            --neon-green: #30d158;
            --neon-red: #ff453a;
            
            --glow-blue: rgba(0, 122, 255, 0.15);
            --glow-green: rgba(48, 209, 88, 0.1);
            --glow-red: rgba(255, 69, 58, 0.1);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: calc(50px + env(safe-area-inset-top)) 24px calc(180px + env(safe-area-inset-bottom)) 24px;
            letter-spacing: -0.02em;
        }

        /* Typography */
        h2 { font-size: 32px; font-weight: 800; margin: 0 0 4px 0; letter-spacing: -0.03em; }
        .subtitle { color: var(--text-muted); font-size: 15px; margin-bottom: 32px; font-weight: 500; }
        h3 { font-size: 18px; font-weight: 700; margin: 0 0 20px 0; color: #f5f5f7; }
        
        .section-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
        }

        /* Action Buttons */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }

        .btn-main {
            border: none;
            border-radius: 18px;
            padding: 20px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-main:active { transform: scale(0.95); opacity: 0.9; }
        
        .btn-in { background: var(--neon-blue); color: #fff; box-shadow: 0 8px 24px var(--glow-blue); }
        .btn-out { background: var(--surface-secondary); color: #fff; border: 1px solid rgba(255,255,255,0.05); }
        
        .btn-sub {
            background: var(--surface-secondary);
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-sub:active { color: var(--text); background: rgba(255,255,255,0.05); }

        /* Status Banner */
        #today-status {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            background: rgba(255,255,255,0.02);
            padding: 10px;
            border-radius: 12px;
        }

        /* Sexy Inputs */
        .input-group { margin-bottom: 20px; }
        .input-group:last-child { margin-bottom: 0; }
        .input-group label { 
            display: block; 
            font-size: 11px; 
            font-weight: 700;
            color: var(--text-muted); 
            margin-bottom: 8px; 
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .input-group input {
            width: 100%; 
            padding: 16px; 
            border: 1px solid var(--border);
            border-radius: 16px; 
            background: #000000; 
            color: var(--text); 
            font-size: 16px;
            font-weight: 600;
            outline: none;
            transition: all 0.2s;
        }
        .input-group input:focus { border-color: var(--neon-blue); box-shadow: 0 0 12px var(--glow-blue); }

        .btn-action {
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 15px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
        }

        /* Floating Futuristic Dashboard */
        .floating-dash {
            position: fixed; 
            bottom: calc(20px + env(safe-area-inset-bottom)); 
            left: 20px; 
            right: 20px;
            background: rgba(18, 18, 20, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 28px;
            padding: 20px;
            display: grid; 
            grid-template-columns: repeat(3, 1fr);
            gap: 12px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .dash-item { text-align: center; }
        .dash-item .val { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
        .dash-item .lbl { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
        
        .dash-fullrow {
            grid-column: span 3;
            border-top: 1px solid rgba(255,255,255,0.06);
            padding-top: 16px;
            margin-top: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dash-fullrow .lbl { font-size: 13px; font-weight: 700; color: #fff; }
        .dash-fullrow .val { font-size: 24px; font-weight: 900; color: var(--neon-blue); text-shadow: 0 0 20px var(--glow-blue); }

        /* Modern History Logs */
        .history-item {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 16px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .history-item:last-child { border-bottom: none; }
        .history-date { font-weight: 700; font-size: 15px; }
        .history-time { color: var(--text-muted); font-size: 13px; margin-top: 4px; font-weight: 500; }
        
        .badge {
            font-size: 12px; 
            font-weight: 700;
            padding: 6px 12px; 
            border-radius: 10px; 
        }
        .badge-extra { background: var(--glow-green); color: var(--neon-green); }
        .badge-deficit { background: var(--glow-red); color: var(--neon-red); }
        .badge-special { background: var(--glow-blue); color: var(--neon-blue); }
    </style>
</head>
<body>

    <h2 id="current-date">Overview</h2>
    <div class="subtitle">Track your daily shift metrics</div>

    <div class="section-card">
        <div class="grid-2">
            <button class="btn-main btn-in" onclick="logAction('in')">
                <span style="font-size: 20px;">⏱️</span>
                <span>Check In</span>
            </button>
            <button class="btn-main btn-out" onclick="logAction('out')">
                <span style="font-size: 20px;">🛑</span>
                <span>Check Out</span>
            </button>
        </div>
        <div class="grid-2">
            <button class="btn-sub" onclick="logSpecial('Vacation')">🌴 Vacation</button>
            <button class="btn-sub" onclick="logSpecial('Sick Leave')">🤒 Sick</button>
        </div>
        <div id="today-status">No active shift recorded today</div>
    </div>

    <div class="section-card">
        <h3>Adjust Entry</h3>
        <div class="input-group">
            <label>Date</label>
            <input type="date" id="edit-date">
        </div>
        <div class="grid-2">
            <div class="input-group">
                <label>In</label>
                <input type="time" id="edit-in">
            </div>
            <div class="input-group">
                <label>Out</label>
                <input type="time" id="edit-out">
            </div>
        </div>
        <button class="btn-action" onclick="saveManual()">Save Changes</button>
    </div>

    <div class="section-card">
        <h3>Parameters</h3>
        <div class="input-group">
            <label>Base Monthly Salary (₪)</label>
            <input type="number" id="cfg-base-salary" value="15000" onchange="saveConfig()">
        </div>
        <div class="input-group">
            <label>Daily Travel Allowance (₪)</label>
            <input type="number" id="cfg-travel" value="25" onchange="saveConfig()">
        </div>
    </div>

    <div class="section-card">
        <h3>Activity Log</h3>
        <div id="history-list"></div>
    </div>

    <div class="floating-dash">
        <div class="dash-item">
            <div class="val" id="dash-normal">0</div>
            <div class="lbl">Regular</div>
        </div>
        <div class="dash-item" style="color: var(--neon-green);">
            <div class="val" id="dash-extra">0</div>
            <div class="lbl">Overtime</div>
        </div>
        <div class="dash-item" style="color: var(--neon-red);">
            <div class="val" id="dash-deficit">0</div>
            <div class="lbl">Deficit</div>
        </div>
        <div class="dash-fullrow">
            <div class="lbl">ESTIMATED GROSS</div>
            <div class="val" id="dash-gross">₪0</div>
        </div>
    </div>

    <script>
        const STANDARD_HOURS = 8.5;
        let db = JSON.parse(localStorage.getItem('work_hours_db')) || {};
        let config = JSON.parse(localStorage.getItem('work_hours_cfg')) || { baseSalary: 15000, travel: 25 };

        document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', day: 'numeric', month: 'short' });
        document.getElementById('edit-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('cfg-base-salary').value = config.baseSalary;
        document.getElementById('cfg-travel').value = config.travel;

        function saveConfig() {
            config.baseSalary = parseFloat(document.getElementById('cfg-base-salary').value) || 0;
            config.travel = parseFloat(document.getElementById('cfg-travel').value) || 0;
            localStorage.setItem('work_hours_cfg', JSON.stringify(config));
            calculateMonth();
        }

        function getTodayKey() {
            return new Date().toISOString().split('T')[0];
        }

        function logAction(type) {
            const today = getTodayKey();
            const now = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
            
            if (!db[today]) db[today] = { in: '', out: '', type: 'Work' };
            db[today][type] = now;
            db[today].type = 'Work';
            
            localStorage.setItem('work_hours_db', JSON.stringify(db));
            updateTodayStatus();
            calculateMonth();
        }

        function logSpecial(statusType) {
            const today = getTodayKey();
            db[today] = { in: '00:00', out: '00:00', type: statusType };
            localStorage.setItem('work_hours_db', JSON.stringify(db));
            updateTodayStatus();
            calculateMonth();
        }

        function saveManual() {
            const date = document.getElementById('edit-date').value;
            const timeIn = document.getElementById('edit-in').value;
            const timeOut = document.getElementById('edit-out').value;
            if(!date) return;
            
            db[date] = { in: timeIn, out: timeOut, type: 'Work' };
            localStorage.setItem('work_hours_db', JSON.stringify(db));
            calculateMonth();
            alert('Entry updated.');
        }

        function updateTodayStatus() {
            const today = db[getTodayKey()];
            const statusDiv = document.getElementById('today-status');
            if (today) {
                if (today.type !== 'Work') {
                    statusDiv.innerHTML = `Today: <span style="color:var(--neon-blue)">${today.type}</span>`;
                } else {
                    statusDiv.innerHTML = `In: ${today.in || '--:--'}  |  Out: ${today.out || '--:--'}`;
                }
            }
        }

        function timeToHours(timeStr) {
            if (!timeStr) return 0;
            const [hrs, mins] = timeStr.split(':').map(Number);
            return hrs + (mins / 60);
        }

        function calculateMonth() {
            let totalNormal = 0, totalExtra125 = 0, totalExtra150 = 0, totalDeficit = 0, workingDaysCount = 0;
            const historyList = document.getElementById('history-list');
            historyList.innerHTML = '';

            const sortedDates = Object.keys(db).sort((a,b) => new Date(b) - new Date(a));

            sortedDates.forEach(date => {
                const dayData = db[date];
                let dayNormal = 0, dayExtra125 = 0, dayExtra150 = 0, dayDeficit = 0;
                let displayTime = '', badgeHTML = '';

                if (dayData.type === 'Vacation' || dayData.type === 'Sick Leave') {
                    dayNormal = STANDARD_HOURS;
                    displayTime = dayData.type;
                    badgeHTML = `<span class="badge badge-special">${dayData.type}</span>`;
                } else if (dayData.in && dayData.out) {
                    workingDaysCount++;
                    const hoursWorked = timeToHours(dayData.out) - timeToHours(dayData.in);
                    displayTime = `${dayData.in} — ${dayData.out}`;

                    if (hoursWorked >= STANDARD_HOURS) {
                        dayNormal = STANDARD_HOURS;
                        let extra = hoursWorked - STANDARD_HOURS;
                        if (extra > 0) {
                            dayExtra125 = Math.min(extra, 2);
                            dayExtra150 = Math.max(0, extra - 2);
                            badgeHTML = `<span class="badge badge-extra">+${(dayExtra125 + dayExtra150).toFixed(1)}h</span>`;
                        }
                    } else {
                        dayNormal = hoursWorked;
                        dayDeficit = STANDARD_HOURS - hoursWorked;
                        badgeHTML = `<span class="badge badge-deficit">-${dayDeficit.toFixed(1)}h</span>`;
                    }
                }

                totalNormal += dayNormal;
                totalExtra125 += dayExtra125;
                totalExtra150 += dayExtra150;
                totalDeficit += dayDeficit;

                const formattedDate = new Date(date).toLocaleDateString('en-US', {day: 'numeric', month: 'short'});
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <div>
                        <div class="history-date">${formattedDate}</div>
                        <div class="history-time">${displayTime}</div>
                    </div>
                    <div>${badgeHTML}</div>
                `;
                historyList.appendChild(item);
            });

            const hourlyRate = config.baseSalary / 182;
            const extraPay = (totalExtra125 * hourlyRate * 1.25) + (totalExtra150 * hourlyRate * 1.5);
            const deficitDeduction = totalDeficit * hourlyRate;
            const travelPay = workingDaysCount * config.travel;
            const estimatedGross = config.baseSalary + extraPay - deficitDeduction + travelPay;

            document.getElementById('dash-normal').innerText = totalNormal.toFixed(1);
            document.getElementById('dash-extra').innerText = (totalExtra125 + totalExtra150).toFixed(1);
            document.getElementById('dash-deficit').innerText = totalDeficit.toFixed(1);
            document.getElementById('dash-gross').innerText = `₪${Math.round(estimatedGross).toLocaleString()}`;
        }

        updateTodayStatus();
        calculateMonth();
    </script>
</body>
</html>
